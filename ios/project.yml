name: FreeLedger
options:
  bundleIdPrefix: com.freeledger
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  FreeLedger:
    type: application
    platform: iOS
    sources:
      - FreeLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freeledger.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        SWIFT_EMIT_LOC_STRINGS: "YES"
        DEVELOPMENT_LANGUAGE: zh-Hans
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: GRDB
        product: GRDB
    resources:
      - path: FreeLedger/i18n
        buildPhase: resources
      - path: FreeLedger/data/categories-expense.json
        buildPhase: resources
      - path: FreeLedger/data/categories-income.json
        buildPhase: resources

  FreeLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FreeLedgerTests
    dependencies:
      - target: FreeLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freeledger.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
