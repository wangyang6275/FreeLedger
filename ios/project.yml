name: ColorFuLedger
options:
  bundleIdPrefix: com.colorfuledger
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

schemes:
  ColorFuLedger:
    build:
      targets:
        ColorFuLedger: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ColorFuLedgerTests

targets:
  ColorFuLedger:
    type: application
    platform: iOS
    sources:
      - ColorFuLedger
    entitlements:
      path: ColorFuLedger/ColorFuLedger.entitlements
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colorfuledger.app
        DEVELOPMENT_TEAM: QLJ5YWNC2W
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        SWIFT_EMIT_LOC_STRINGS: "YES"
        DEVELOPMENT_LANGUAGE: zh-Hans
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "6.0"
    info:
      path: ColorFuLedger/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - colorfuledger
    dependencies:
      - package: GRDB
        product: GRDB
      - target: ColorFuLedgerWidget
        embed: true
    resources:
      - path: ColorFuLedger/i18n
        buildPhase: resources
      - path: ColorFuLedger/data/categories-expense.json
        buildPhase: resources
      - path: ColorFuLedger/data/categories-income.json
        buildPhase: resources

  ColorFuLedgerWidget:
    type: app-extension
    platform: iOS
    sources:
      - ColorFuLedgerWidget
      - path: ColorFuLedger/data/service/WidgetDataBridge.swift
        buildPhase: sources
    entitlements:
      path: ColorFuLedgerWidget/ColorFuLedgerWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colorfuledger.app.widget
        DEVELOPMENT_TEAM: QLJ5YWNC2W
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        DEVELOPMENT_LANGUAGE: zh-Hans
        SWIFT_VERSION: "6.0"
    info:
      path: ColorFuLedgerWidget/Info.plist
      properties:
        CFBundleDisplayName: ColorFuLedger Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    resources:
      - path: ColorFuLedgerWidget/i18n
        buildPhase: resources

  ColorFuLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ColorFuLedgerTests
    dependencies:
      - target: ColorFuLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colorfuledger.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
